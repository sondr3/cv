[tasks.lint]
run = "cue vet -c"

[tasks.format]
run = """
cue fmt
typstyle --inplace norwegian.typ english.typ template.typ
"""

[tasks.build]
run = """
cue export . -e norwegian -f -o norwegian.json
cue export . -e english -f -o english.json
typst compile norwegian.typ ../public/norwegian.pdf
typst compile english.typ ../public/english.pdf
"""